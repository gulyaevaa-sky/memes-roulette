<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Мем-Рулетка 🎰</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange:  #FF5B04;
      --fuchsia: #D946EF;
      --violet:  #7C3AED;
      --yellow:  #FFE500;
      --ink:     #0F0F0F;
      --white:   #FFFFFF;
      --bg:      #FEFCFF;
      --img-bg:  #F4F2FF;
      --muted:   #9CA3AF;
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      background-image:
        radial-gradient(ellipse 55% 45% at 5% 8%,  rgba(255,91,4,.13)   0%, transparent 55%),
        radial-gradient(ellipse 45% 40% at 96% 92%, rgba(217,70,239,.12) 0%, transparent 55%),
        radial-gradient(ellipse 30% 25% at 80% 12%, rgba(124,58,237,.09) 0%, transparent 50%);
      color: var(--ink);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 44px 20px 72px;
    }

    /* ── Decorative blobs ── */
    body::before {
      content: '';
      position: fixed;
      top: -80px; right: -80px;
      width: 300px; height: 300px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,229,0,.35) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Header ── */
    header {
      text-align: center;
      margin-bottom: 36px;
      position: relative;
      z-index: 1;
    }

    .logo {
      display: block;
      font-size: 60px;
      line-height: 1;
      margin-bottom: 16px;
      animation: bounce 1.4s cubic-bezier(.36,.07,.19,.97) infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0) rotate(-6deg) scale(1); }
      35%       { transform: translateY(-14px) rotate(6deg) scale(1.08); }
      65%       { transform: translateY(-6px) rotate(-2deg) scale(1.03); }
    }

    header h1 {
      font-size: clamp(32px, 7vw, 54px);
      font-weight: 900;
      letter-spacing: -2.5px;
      line-height: 1;
      background: linear-gradient(130deg, var(--orange) 0%, var(--fuchsia) 55%, var(--violet) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 10px;
    }

    header p {
      color: var(--muted);
      font-size: 15px;
      font-weight: 500;
    }

    /* ── Card ── */
    .card {
      position: relative;
      width: 100%;
      max-width: 640px;
      background: var(--white);
      border-radius: 24px;
      border: 2.5px solid var(--ink);
      box-shadow: 8px 8px 0px var(--orange);
      overflow: hidden;
      margin-bottom: 32px;
      z-index: 1;
      transition: transform .12s ease, box-shadow .12s ease;
      will-change: transform;
    }

    .card:hover {
      transform: translate(-4px, -4px);
      box-shadow: 12px 12px 0px var(--orange);
    }

    /* ── Image area ── */
    .img-area {
      position: relative;
      height: 420px;
      background: var(--img-bg);
      overflow: hidden;
    }

    .img-area::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: repeating-conic-gradient(rgba(0,0,0,.03) 0% 25%, transparent 0% 50%);
      background-size: 20px 20px;
      pointer-events: none;
    }

    .meme-img {
      display: block;
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      object-fit: contain;
      opacity: 0;
    }

    .meme-img.visible {
      animation: revealMeme .42s cubic-bezier(.22,1,.36,1) forwards;
    }

    @keyframes revealMeme {
      from { opacity: 0; filter: blur(10px); transform: scale(.94); }
      to   { opacity: 1; filter: blur(0);    transform: scale(1); }
    }

    /* ── Overlays ── */
    .overlay {
      position: absolute;
      inset: 0;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background: rgba(254,252,255,.93);
      backdrop-filter: blur(8px);
      transition: opacity .25s ease;
    }

    .overlay.gone { opacity: 0; pointer-events: none; }

    /* Spinner */
    .spin-ring {
      width: 56px; height: 56px;
      position: relative;
    }

    .spin-ring::before, .spin-ring::after {
      content: ''; position: absolute; inset: 0; border-radius: 50%;
    }

    .spin-ring::before { border: 3.5px solid rgba(255,91,4,.15); }

    .spin-ring::after {
      border: 3.5px solid transparent;
      border-top-color: var(--orange);
      border-right-color: var(--fuchsia);
      animation: spin .72s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .ov-label {
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
    }

    .err-emoji { font-size: 48px; }

    .err-msg {
      color: var(--muted);
      font-size: 14px;
      text-align: center;
      line-height: 1.7;
    }

    /* ── Card footer ── */
    .card-footer {
      padding: 18px 22px 20px;
      border-top: 2px solid rgba(0,0,0,.07);
      background: var(--white);
    }

    .meme-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--ink);
      line-height: 1.5;
      margin-bottom: 12px;
      min-height: 23px;
    }

    .meme-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 13px;
      border-radius: 100px;
      font-size: 12px;
      font-weight: 700;
      border: 2px solid;
      transition: transform .12s ease;
    }

    .pill-jr {
      background: rgba(255,91,4,.07);
      border-color: var(--orange);
      color: var(--orange);
      text-decoration: none;
    }

    .pill-jr:hover {
      background: var(--orange);
      color: #fff;
      transform: translateY(-2px);
    }

    .pill-sub {
      background: transparent;
      border-color: rgba(0,0,0,.12);
      color: var(--muted);
    }

    /* ── Button ── */
    .btn {
      position: relative;
      z-index: 1;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 18px 54px;
      font-family: 'Inter', sans-serif;
      font-size: 17px;
      font-weight: 800;
      color: #fff;
      background: linear-gradient(135deg, var(--orange) 0%, var(--fuchsia) 100%);
      border: 2.5px solid var(--ink);
      border-radius: 100px;
      cursor: pointer;
      user-select: none;
      letter-spacing: .02em;
      box-shadow: 5px 5px 0px var(--ink);
      overflow: hidden;
      transition: transform .1s ease, box-shadow .1s ease;
    }

    .btn::after {
      content: '';
      position: absolute;
      top: -50%; left: -80%;
      width: 55%; height: 200%;
      background: linear-gradient(105deg, transparent 38%, rgba(255,255,255,.3) 50%, transparent 62%);
      transition: left .5s ease;
      pointer-events: none;
    }

    .btn:hover:not(:disabled)::after { left: 125%; }

    .btn:hover:not(:disabled) {
      transform: translate(-3px, -3px);
      box-shadow: 8px 8px 0px var(--ink);
    }

    .btn:active:not(:disabled) {
      transform: translate(2px, 2px);
      box-shadow: 3px 3px 0px var(--ink);
    }

    .btn:disabled {
      cursor: not-allowed;
      opacity: .65;
    }

    .btn-ring {
      width: 18px; height: 18px;
      border: 2.5px solid rgba(255,255,255,.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .65s linear infinite;
      display: none; flex-shrink: 0;
    }

    .btn.loading .btn-ring { display: block; }
    .btn.loading .btn-dice { display: none; }

    /* ── Site footer ── */
    footer {
      margin-top: 28px;
      color: var(--muted);
      font-size: 12px;
      text-align: center;
      line-height: 1.9;
      position: relative;
      z-index: 1;
    }

    footer a {
      color: var(--orange);
      font-weight: 700;
      text-decoration: none;
    }

    footer a:hover { text-decoration: underline; }

    @media (max-width: 500px) {
      body { padding: 28px 16px 56px; }
      .img-area { height: 300px; }
      .btn { padding: 16px 36px; font-size: 15px; }
      .card-footer { padding: 14px 16px 16px; }
      .card { box-shadow: 5px 5px 0px var(--orange); }
      .card:hover { box-shadow: 8px 8px 0px var(--orange); }
    }
  </style>
</head>
<body>

<header>
  <span class="logo">🎰</span>
  <h1>Мем-Рулетка</h1>
  <p>Случайные посты из ру-сабреддитов Реддита</p>
</header>

<div class="card">
  <div class="img-area" id="imgArea">
    <img class="meme-img" id="memeImg" alt="мем" />

    <div class="overlay" id="spinnerOv">
      <div class="spin-ring"></div>
      <span class="ov-label">Крутим барабаны Реддита…</span>
    </div>

    <div class="overlay gone" id="errorOv">
      <span class="err-emoji">🎰</span>
      <p class="err-msg" id="errMsg">Барабаны застряли<br>Попробуй ещё раз!</p>
    </div>
  </div>

  <div class="card-footer">
    <div class="meme-title" id="memeTitle">&nbsp;</div>
    <div class="meme-meta" id="memeMeta" hidden>
      <a class="pill pill-jr" id="postLink" href="#" target="_blank" rel="noopener">
        🔗 Открыть на Reddit
      </a>
      <span class="pill pill-sub" id="postSub"></span>
    </div>
  </div>
</div>

<button class="btn loading" id="mainBtn" onclick="loadMeme()">
  <span class="btn-ring"></span>
  <span class="btn-dice">🎲</span>
  <span id="btnLabel">Крутить рулетку</span>
</button>

<footer>
  Посты из сабреддитов <a href="https://www.reddit.com/r/ru/" target="_blank" rel="noopener">r/ru</a> и <a href="https://www.reddit.com/r/2ch/" target="_blank" rel="noopener">r/2ch</a>
</footer>

<script>
  // ── Сабреддиты без Пикабу ──
  const SUBREDDITS = ['ru', '2ch'];

  const btn       = document.getElementById('mainBtn');
  const btnLabel  = document.getElementById('btnLabel');
  const memeImg   = document.getElementById('memeImg');
  const memeTitle = document.getElementById('memeTitle');
  const memeMeta  = document.getElementById('memeMeta');
  const postLink  = document.getElementById('postLink');
  const postSub   = document.getElementById('postSub');
  const spinnerOv = document.getElementById('spinnerOv');
  const errorOv   = document.getElementById('errorOv');
  const errMsg    = document.getElementById('errMsg');

  let queue = [];
  let busy  = false;

  function setLoading(on) {
    busy = on;
    btn.disabled = on;
    btn.classList.toggle('loading', on);
    btnLabel.textContent = on ? 'Загружаю…' : 'Крутить рулетку';
    if (on) {
      memeImg.classList.remove('visible');
      spinnerOv.classList.remove('gone');
      errorOv.classList.add('gone');
    }
  }

  function showError(msg) {
    spinnerOv.classList.add('gone');
    errorOv.classList.remove('gone');
    errMsg.innerHTML = msg;
    busy = false;
    btn.disabled = false;
    btn.classList.remove('loading');
    btnLabel.textContent = 'Крутить рулетку';
  }

  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  // ── Получение пачки постов через CORS-открытый шлюз meme-api ──
  async function fetchBatch() {
    const sub = SUBREDDITS[Math.floor(Math.random() * SUBREDDITS.length)];
    // Запрашиваем сразу 25 мемов из выбранного сабреддита
    const url = `https://meme-api.com/gimme/${sub}/25`;

    const res = await fetch(url);
    if (!res.ok) throw new Error(`API Error ${res.status}`);
    
    const json = await res.json();
    if (!json.memes || !Array.isArray(json.memes)) throw new Error('Неверная структура данных от API');

    const posts = json.memes.map(m => ({
      title: m.title || 'Без названия',
      url:   m.url,
      link:  m.postLink || `https://reddit.com/r/${sub}`,
      sub:   m.subreddit || sub
    }));

    if (posts.length === 0) throw new Error(`В сабреддите r/${sub} не найдено постов`);
    
    return shuffle(posts);
  }

  async function nextPost() {
    if (queue.length === 0) {
      queue = await fetchBatch();
    }
    return queue.pop();
  }

  function showMeme(post) {
    const tmp = new Image();

    tmp.onload = () => {
      memeImg.src = tmp.src;
      memeTitle.textContent = post.title;
      postLink.href = post.link;
      postSub.textContent = `r/${post.sub}`;
      memeMeta.hidden = false;

      spinnerOv.classList.add('gone');
      errorOv.classList.add('gone');

      void memeImg.offsetWidth;
      memeImg.classList.add('visible');

      setLoading(false);
    };

    tmp.onerror = () => {
      console.warn('[Мем-Рулетка] Ошибка загрузки картинки, беру следующую из очереди:', tmp.src);
      if (queue.length > 0) {
        showMeme(queue.pop());
      } else {
        showError('Не удалось отобразить изображение 🖼<br>Попробуй ещё раз!');
      }
    };

    tmp.src = post.url;
  }

  async function loadMeme() {
    if (busy) return;
    setLoading(true);
    try {
      const post = await nextPost();
      showMeme(post);
    } catch (e) {
      console.error('[Мем-Рулетка]', e);
      showError(
        'Проблема со связью 😵<br>' +
        '<span style="font-size:11px;opacity:.7">Не удалось достучаться до API. Проверь сеть и кликни ещё раз!</span>'
      );
    }
  }

  // Первый запуск при открытии страницы
  loadMeme();
</script>

</body>
</html>
