<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Мем-Рулетка 🎰</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange:  #FF5B04;
      --fuchsia: #D946EF;
      --violet:  #7C3AED;
      --yellow:  #FFE500;
      --ink:     #0F0F0F;
      --white:   #FFFFFF;
      --bg:      #FEFCFF;
      --img-bg:  #F4F2FF;
      --muted:   #9CA3AF;
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      background-image:
        radial-gradient(ellipse 55% 45% at 5% 8%,  rgba(255,91,4,.13)   0%, transparent 55%),
        radial-gradient(ellipse 45% 40% at 96% 92%, rgba(217,70,239,.12) 0%, transparent 55%),
        radial-gradient(ellipse 30% 25% at 80% 12%, rgba(124,58,237,.09) 0%, transparent 50%);
      color: var(--ink);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 44px 20px 72px;
    }

    /* ── Decorative blobs ── */
    body::before {
      content: '';
      position: fixed;
      top: -80px; right: -80px;
      width: 300px; height: 300px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,229,0,.35) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Header ── */
    header {
      text-align: center;
      margin-bottom: 36px;
      position: relative;
      z-index: 1;
    }

    .logo {
      display: block;
      font-size: 60px;
      line-height: 1;
      margin-bottom: 16px;
      animation: bounce 1.4s cubic-bezier(.36,.07,.19,.97) infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0) rotate(-6deg) scale(1); }
      35%       { transform: translateY(-14px) rotate(6deg) scale(1.08); }
      65%       { transform: translateY(-6px) rotate(-2deg) scale(1.03); }
    }

    header h1 {
      font-size: clamp(32px, 7vw, 54px);
      font-weight: 900;
      letter-spacing: -2.5px;
      line-height: 1;
      background: linear-gradient(130deg, var(--orange) 0%, var(--fuchsia) 55%, var(--violet) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 10px;
    }

    header p {
      color: var(--muted);
      font-size: 15px;
      font-weight: 500;
    }

    /* ── Card ── */
    .card {
      position: relative;
      width: 100%;
      max-width: 640px;
      background: var(--white);
      border-radius: 24px;
      border: 2.5px solid var(--ink);
      box-shadow: 8px 8px 0px var(--orange);
      overflow: hidden;
      margin-bottom: 32px;
      z-index: 1;
      transition: transform .12s ease, box-shadow .12s ease;
      will-change: transform;
    }

    .card:hover {
      transform: translate(-4px, -4px);
      box-shadow: 12px 12px 0px var(--orange);
    }

    /* ── Image area ── */
    .img-area {
      position: relative;
      height: 420px;
      background: var(--img-bg);
      overflow: hidden;
    }

    /* Subtle checkerboard pattern for transparency */
    .img-area::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        repeating-conic-gradient(rgba(0,0,0,.03) 0% 25%, transparent 0% 50%);
      background-size: 20px 20px;
      pointer-events: none;
    }

    .meme-img {
      display: block;
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      object-fit: contain;
      opacity: 0;
    }

    .meme-img.visible {
      animation: revealMeme .42s cubic-bezier(.22,1,.36,1) forwards;
    }

    @keyframes revealMeme {
      from { opacity: 0; filter: blur(10px); transform: scale(.94); }
      to   { opacity: 1; filter: blur(0);    transform: scale(1); }
    }

    /* ── Overlays ── */
    .overlay {
      position: absolute;
      inset: 0;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background: rgba(254,252,255,.93);
      backdrop-filter: blur(8px);
      transition: opacity .25s ease;
    }

    .overlay.gone { opacity: 0; pointer-events: none; }

    /* Spinner */
    .spin-ring {
      width: 56px; height: 56px;
      position: relative;
    }

    .spin-ring::before, .spin-ring::after {
      content: ''; position: absolute; inset: 0; border-radius: 50%;
    }

    .spin-ring::before { border: 3.5px solid rgba(255,91,4,.15); }

    .spin-ring::after {
      border: 3.5px solid transparent;
      border-top-color: var(--orange);
      border-right-color: var(--fuchsia);
      animation: spin .72s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .ov-label {
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
    }

    .err-emoji { font-size: 48px; }

    .err-msg {
      color: var(--muted);
      font-size: 14px;
      text-align: center;
      line-height: 1.7;
    }

    /* ── Card footer ── */
    .card-footer {
      padding: 18px 22px 20px;
      border-top: 2px solid rgba(0,0,0,.07);
      background: var(--white);
    }

    .meme-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--ink);
      line-height: 1.5;
      margin-bottom: 12px;
      min-height: 23px;
    }

    .meme-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 13px;
      border-radius: 100px;
      font-size: 12px;
      font-weight: 700;
      border: 2px solid;
      transition: transform .12s ease;
    }

    .pill-jr {
      background: rgba(255,91,4,.07);
      border-color: var(--orange);
      color: var(--orange);
      text-decoration: none;
    }

    .pill-jr:hover {
      background: var(--orange);
      color: #fff;
      transform: translateY(-2px);
    }

    .pill-date {
      background: transparent;
      border-color: rgba(0,0,0,.12);
      color: var(--muted);
    }

    /* ── Button ── */
    .btn {
      position: relative;
      z-index: 1;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 18px 54px;
      font-family: 'Inter', sans-serif;
      font-size: 17px;
      font-weight: 800;
      color: #fff;
      background: linear-gradient(135deg, var(--orange) 0%, var(--fuchsia) 100%);
      border: 2.5px solid var(--ink);
      border-radius: 100px;
      cursor: pointer;
      user-select: none;
      letter-spacing: .02em;
      box-shadow: 5px 5px 0px var(--ink);
      overflow: hidden;
      transition: transform .1s ease, box-shadow .1s ease;
    }

    /* Shine sweep */
    .btn::after {
      content: '';
      position: absolute;
      top: -50%; left: -80%;
      width: 55%; height: 200%;
      background: linear-gradient(105deg, transparent 38%, rgba(255,255,255,.3) 50%, transparent 62%);
      transition: left .5s ease;
      pointer-events: none;
    }

    .btn:hover:not(:disabled)::after { left: 125%; }

    .btn:hover:not(:disabled) {
      transform: translate(-3px, -3px);
      box-shadow: 8px 8px 0px var(--ink);
    }

    .btn:active:not(:disabled) {
      transform: translate(2px, 2px);
      box-shadow: 3px 3px 0px var(--ink);
    }

    .btn:disabled {
      cursor: not-allowed;
      opacity: .65;
    }

    /* Mini spinner inside button */
    .btn-ring {
      width: 18px; height: 18px;
      border: 2.5px solid rgba(255,255,255,.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .65s linear infinite;
      display: none; flex-shrink: 0;
    }

    .btn.loading .btn-ring { display: block; }
    .btn.loading .btn-dice { display: none; }

    /* ── Site footer ── */
    footer {
      margin-top: 28px;
      color: var(--muted);
      font-size: 12px;
      text-align: center;
      line-height: 1.9;
      position: relative;
      z-index: 1;
    }

    footer a {
      color: var(--orange);
      font-weight: 700;
      text-decoration: none;
    }

    footer a:hover { text-decoration: underline; }

    /* ── Responsive ── */
    @media (max-width: 500px) {
      body { padding: 28px 16px 56px; }
      .img-area { height: 300px; }
      .btn { padding: 16px 36px; font-size: 15px; }
      .card-footer { padding: 14px 16px 16px; }
      .card { box-shadow: 5px 5px 0px var(--orange); }
      .card:hover { box-shadow: 8px 8px 0px var(--orange); }
    }

    @media (prefers-reduced-motion: reduce) {
      .logo { animation: none; }
      .meme-img.visible { animation: none; opacity: 1; }
      .btn::after { display: none; }
      .card, .btn { transition: none; }
    }
  </style>
</head>
<body>

<header>
  <span class="logo">🎰</span>
  <h1>Мем-Рулетка</h1>
  <p>Случайные мемы с Reddit — русские сабреддиты</p>
</header>

<div class="card">
  <div class="img-area" id="imgArea">

    <img class="meme-img" id="memeImg" alt="мем" />

    <!-- Loading overlay -->
    <div class="overlay" id="spinnerOv">
      <div class="spin-ring"></div>
      <span class="ov-label">Крутим барабаны…</span>
    </div>

    <!-- Error overlay -->
    <div class="overlay gone" id="errorOv">
      <span class="err-emoji">🎰</span>
      <p class="err-msg" id="errMsg">Барабаны застряли<br>Попробуй ещё раз!</p>
    </div>

  </div>

  <div class="card-footer">
    <div class="meme-title" id="memeTitle">&nbsp;</div>
    <div class="meme-meta" id="memeMeta" hidden>
      <a class="pill pill-jr" id="subPill" href="#" target="_blank" rel="noopener">r/…</a>
      <span class="pill pill-date" id="upsPill">▲ 0</span>
    </div>
  </div>
</div>

<button class="btn loading" id="mainBtn" onclick="loadMeme()">
  <span class="btn-ring"></span>
  <span class="btn-dice">🎲</span>
  <span id="btnLabel">Крутить рулетку</span>
</button>

<footer>
  Мемы с <a href="https://reddit.com/r/Pikabu" target="_blank" rel="noopener">r/Pikabu</a>,
  <a href="https://reddit.com/r/ru" target="_blank" rel="noopener">r/ru</a>,
  <a href="https://reddit.com/r/2ch" target="_blank" rel="noopener">r/2ch</a>
</footer>

<script>
  // ── Reddit JSON API — русские сабреддиты ──
  // Работает без ключей, CORS открыт
  const SUBS = [
    { name: 'Pikabu',  sort: 'hot'  },   // зеркало Пикабу
    { name: 'Pikabu',  sort: 'top'  },
    { name: 'ru',      sort: 'hot'  },   // общий русский
    { name: '2ch',     sort: 'hot'  },   // двач-юмор
    { name: '2ch',     sort: 'top'  },
    { name: 'russia',  sort: 'hot'  },
  ];

  const btn       = document.getElementById('mainBtn');
  const btnLabel  = document.getElementById('btnLabel');
  const memeImg   = document.getElementById('memeImg');
  const memeTitle = document.getElementById('memeTitle');
  const memeMeta  = document.getElementById('memeMeta');
  const postLink  = document.getElementById('postLink');
  const postDate  = document.getElementById('postDate');
  const spinnerOv = document.getElementById('spinnerOv');
  const errorOv   = document.getElementById('errorOv');
  const errMsg    = document.getElementById('errMsg');

  let queue = [];
  let busy  = false;

  // ── Состояние ──

  function setLoading(on) {
    busy = on;
    btn.disabled = on;
    btn.classList.toggle('loading', on);
    btnLabel.textContent = on ? 'Загружаю…' : 'Крутить рулетку';
    if (on) {
      memeImg.classList.remove('visible');
      spinnerOv.classList.remove('gone');
      errorOv.classList.add('gone');
    }
  }

  function showError(msg) {
    spinnerOv.classList.add('gone');
    errorOv.classList.remove('gone');
    errMsg.innerHTML = msg;
    busy = false;
    btn.disabled = false;
    btn.classList.remove('loading');
    btnLabel.textContent = 'Крутить рулетку';
  }

  // ── Хелперы ──

  function isImageUrl(url) {
    if (!url) return false;
    return url.includes('i.redd.it/')
        || url.includes('i.imgur.com/')
        || /\.(jpg|jpeg|png|gif|webp)(\?.*)?$/i.test(url);
  }

  function fmtNum(n) {
    if (n >= 1000) return (n / 1000).toFixed(1).replace(/\.0$/, '') + 'k';
    return String(n);
  }

  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  // ── Загрузка пачки ──

  async function fetchBatch() {
    // Берём случайный сабреддит из списка
    const { name, sort } = SUBS[Math.floor(Math.random() * SUBS.length)];
    const timeParam = sort === 'top' ? '&t=month' : '';
    const url = `https://www.reddit.com/r/${name}/${sort}.json?limit=100&raw_json=1${timeParam}`;

    const res = await fetch(url);
    if (!res.ok) throw new Error(`Reddit HTTP ${res.status}`);
    const data = await res.json();

    const posts = data.data.children
      .map(c => c.data)
      .filter(p => !p.over_18 && !p.is_video && isImageUrl(p.url))
      .map(p => ({
        title: p.title,
        url:   p.url,
        sub:   p.subreddit,
        ups:   p.ups,
        link:  `https://reddit.com${p.permalink}`,
      }));

    if (posts.length === 0) throw new Error(`Нет картинок в r/${name}`);
    return shuffle(posts);
  }

  async function nextPost() {
    if (queue.length === 0) queue = await fetchBatch();
    return queue.pop();
  }

  // ── Отображение ──

  function showMeme(post) {
    const tmp = new Image();

    tmp.onload = () => {
      memeImg.src      = tmp.src;
      memeTitle.textContent = post.title;
      postLink.href    = post.link;
      postLink.textContent = `r/${post.sub}  ▲ ${fmtNum(post.ups)}`;
      postDate.textContent = '';   // ups уже в кнопке, дата не нужна
      postDate.hidden  = true;
      memeMeta.hidden  = false;

      spinnerOv.classList.add('gone');
      errorOv.classList.add('gone');

      void memeImg.offsetWidth;
      memeImg.classList.add('visible');

      setLoading(false);
    };

    tmp.onerror = () => {
      console.warn('[Мем-Рулетка] image failed:', tmp.src);
      // Тихо пропускаем битые картинки — берём следующую
      if (queue.length > 0) {
        showMeme(queue.pop());
      } else {
        showError('Картинки кончились 🖼<br>Попробуй ещё раз!');
      }
    };

    tmp.src = post.url;
  }

  // ── Главный обработчик ──

  async function loadMeme() {
    if (busy) return;
    setLoading(true);
    try {
      const post = await nextPost();
      showMeme(post);
    } catch (e) {
      console.error('[Мем-Рулетка]', e);
      showError(
        'Reddit не отвечает 😵<br>' +
        '<span style="font-size:11px;opacity:.7">Проверь интернет и попробуй снова</span>'
      );
    }
  }

  loadMeme();
</script>

</body>
</html>
